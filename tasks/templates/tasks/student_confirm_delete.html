<!DOCTYPE html>
<html>
<head>
    <title>Confirm Delete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --card-border: rgba(148, 163, 184, 0.18);
            --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
            --shadow-md: 0 16px 32px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px 18px 40px;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background:
                radial-gradient(circle at 12% 18%, rgba(99, 102, 241, 0.14), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(14, 165, 233, 0.14), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.08), transparent 30%);
        }

        .page-shell {
            max-width: 640px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 32px;
            animation: fadeInUp 0.45s ease both;
        }

        .hero {
            text-align: center;
            margin-bottom: 24px;
        }

        .warning-icon {
            width: 84px;
            height: 84px;
            margin: 0 auto 18px;
            border-radius: 28px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #ffffff;
            font-size: 2.2rem;
            box-shadow: 0 16px 28px rgba(245, 158, 11, 0.24);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.9rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 12px 0 0;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .confirm-card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            box-shadow: var(--shadow-md);
            padding: 24px;
        }

        .confirm-copy {
            margin: 0;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .student-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 10px 22px rgba(239, 68, 68, 0.12);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        button,
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 0 20px;
            border-radius: 999px;
            border: 0;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease, background 0.25s ease;
            white-space: nowrap;
        }

        button:hover,
        .button-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.14);
            filter: saturate(1.03);
        }

        button {
            background: linear-gradient(135deg, #f87171, #dc2626);
            color: #ffffff;
        }

        .button-link {
            background: #e2e8f0;
            color: #334155;
        }

        .button-link:hover {
            color: #1e293b;
        }

        .footer {
            max-width: 640px;
            margin: 18px auto 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 16px 12px 28px;
            }

            .page-shell {
                padding: 18px;
                border-radius: 20px;
            }

            .confirm-card {
                padding: 18px;
            }

            .warning-icon {
                width: 72px;
                height: 72px;
                border-radius: 22px;
                font-size: 1.9rem;
            }

            .form-actions {
                flex-direction: column;
                align-items: stretch;
            }

            button,
            .button-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="hero">
            <div class="warning-icon">⚠️</div>
            <h1>Confirm Delete</h1>
            <p>This action cannot be undone.</p>
        </div>

        <div class="confirm-card">
            <p class="confirm-copy">
                Are you sure you want to delete:
            </p>
            <div style="text-align:center;">
                <span class="student-badge">"{{ student.name }}"</span>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit">Delete</button>
                    <a class="button-link" href="{% url 'student_list' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">Student Report System • Built with Django</div>
</body>
</html>
